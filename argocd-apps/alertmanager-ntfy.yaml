apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alertmanager-ntfy
  namespace: argocd
spec:
  source:
    repoURL: 'https://github.com/Jacko10101/smart-home.git'
    path: applications/alertmanager-ntfy
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
