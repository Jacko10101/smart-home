apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 85.1.3
    helm:
      values: |
        fullnameOverride: "prometheus"

        grafana:
          enabled: false

        prometheus:
          service:
            type: NodePort
            nodePort: 31090
          prometheusSpec:
            routePrefix: /
            # Trimmed retention: was 14d/8GB. For a smart-home cluster,
            # 3 days of metrics is plenty for debugging — Prometheus is for
            # alerting, not long-term analytics.
            retention: 3d
            retentionSize: 2GB
            resources:
              limits:
                memory: 1024Mi
                cpu: 500m
              requests:
                memory: 512Mi
                cpu: 100m
            serviceMonitorSelector: {}
            # Mount the HA bearer token as a file inside /etc/prometheus/secrets/
            secrets:
              - home-assistant-prom-token
            additionalScrapeConfigs:
              - job_name: 'home-assistant'
                scrape_interval: 30s
                static_configs:
                  - targets: ['home-assistant.home-assistant.svc.cluster.local:8123']
                metrics_path: /api/prometheus
                authorization:
                  type: Bearer
                  credentials_file: /etc/prometheus/secrets/home-assistant-prom-token/token

        alertmanager:
          enabled: true
          service:
            type: NodePort
            nodePort: 30723
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              # Default receiver is 'null': nothing pages unless it explicitly
              # matches the warning or critical route below. This flips the posture
              # from "page everything not excluded" to "only page actionable
              # severities" — kills InfoInhibitor / info / none housekeeping noise
              # at the source instead of playing whack-a-mole.
              receiver: 'null'
              routes:
                - match:
                    alertname: Watchdog
                  receiver: 'null'
                - match:
                    severity: critical
                  receiver: 'ntfy-critical'
                  # 6h repeat - was 1h, which sent 14+ phone buzzes overnight when
                  # a single critical alert (z2m sensors dead-battery) ran for 14h.
                  # 6h gives 4 buzzes/day max while a real issue is unresolved;
                  # for one-off events the first 1-2 buzzes get the message across.
                  repeat_interval: 6h
                - match:
                    severity: warning
                  receiver: 'ntfy-warnings'
                  repeat_interval: 4h
            receivers:
              - name: 'null'
              - name: 'ntfy-critical'
                webhook_configs:
                  - url: 'http://alertmanager-ntfy.monitoring.svc.cluster.local:8000/hook'
                    send_resolved: true
              - name: 'ntfy-warnings'
                webhook_configs:
                  - url: 'http://alertmanager-ntfy.monitoring.svc.cluster.local:8000/hook'
                    # Warnings don't send a "resolved" notification — a warning
                    # quietly clearing isn't worth a tray entry, and during a
                    # recovery storm send_resolved doubles the message count.
                    # Criticals DO keep send_resolved (you want to know a real
                    # problem actually cleared).
                    send_resolved: false
            inhibit_rules:
              # NOTE: helm REPLACES the chart's default inhibit_rules wholesale
              # (it does not merge). The three blocks below are the restored
              # upstream defaults — without them you get a critical AND all its
              # collateral warnings during one outage. Keep them when editing.
              - source_matchers:
                  - 'severity = "critical"'
                target_matchers:
                  - 'severity =~ "warning|info"'
                equal: ['namespace', 'alertname']
              - source_matchers:
                  - 'severity = "warning"'
                target_matchers:
                  - 'severity = "info"'
                equal: ['namespace', 'alertname']
              - source_matchers:
                  - 'alertname = "InfoInhibitor"'
                target_matchers:
                  - 'severity = "info"'
                equal: ['namespace']

              # Smart-home: a sensor reporting low battery suppresses the broader
              # "no zigbee updates" alert - we already know the cause and there's
              # no value re-buzzing the phone. Auto-clears when LowBattery resolves.
              - source_matchers:
                  - 'alertname = "LowBattery"'
                target_matchers:
                  - 'alertname = "Zigbee2MQTTNoUpdates"'
                equal: []

              # Reboot-storm collapse: while the Pi is freshly rebooted (PiRebooted
              # fires for the first ~10min after boot), suppress the inevitable flood
              # of "everything is down / not ready" alerts. Result: ONE "Pi rebooted"
              # notification instead of fifteen. If something stays genuinely broken,
              # PiRebooted resolves at the 10min mark and the real alert fires then —
              # so this delays, never hides, a real failure.
              - source_matchers:
                  - 'alertname = "PiRebooted"'
                target_matchers:
                  - 'alertname =~ "HomeAssistantDown|Zigbee2MQTTDown|MosquittoDown|Zigbee2MQTTBridgeOffline|Zigbee2MQTTNoUpdates|PodNotReady|PodRestartLoop|KubePodNotReady|KubePodCrashLooping|KubeContainerWaiting|KubeDeploymentReplicasMismatch|KubeStatefulSetReplicasMismatch|KubeJobFailed|TargetDown|KubeNodeNotReady|KubeletDown"'
                equal: []
          alertmanagerSpec:
            resources:
              limits:
                memory: 128Mi
                cpu: 100m
              requests:
                memory: 64Mi
                cpu: 20m
            # PVC for alertmanager data dir. Without this it's emptyDir, which
            # wipes silences + notification dedup state on every pod restart.
            # That bit us on 2026-05-18: a rolling restart erased a 48h silence
            # mid-outage and the same alert started buzzing the phone again.
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 1Gi

        # K3s combines control-plane components, so the upstream-default
        # alerts for these always fire as false positives. Disable them.
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false

        prometheusOperator:
          admissionWebhooks:
            enabled: false
            patch:
              enabled: false
          resources:
            limits:
              memory: 256Mi
              cpu: 200m
            requests:
              memory: 100Mi
              cpu: 20m

        kubeStateMetrics:
          enabled: true

        kube-state-metrics:
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
            requests:
              memory: 64Mi
              cpu: 20m

        prometheus-node-exporter:
          resources:
            limits:
              memory: 64Mi
              cpu: 100m
            requests:
              memory: 32Mi
              cpu: 20m
  
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m