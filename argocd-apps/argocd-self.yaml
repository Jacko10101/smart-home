apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self
  namespace: argocd
  annotations:
    # ArgoCD self-manages from upstream. Bumping targetRevision = upgrading ArgoCD.
    # Renovate will auto-PR new versions.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: 'https://github.com/argoproj/argo-cd.git'
    path: manifests
    targetRevision: v3.4.2
    directory:
      include: 'install.yaml'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  # Pi 5 can't run v3 application-controller in 512Mi (OOMs continuously).
  # Ignore the resources field on the SS so our manual patch (1Gi) survives
  # ArgoCD reconciliation. Long-term: vendor install.yaml into a kustomization
  # and patch upstream there instead.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: argocd-application-controller
      jsonPointers:
        - /spec/template/spec/containers/0/resources
    - group: apps
      kind: Deployment
      name: argocd-repo-server
      jsonPointers:
        - /spec/template/spec/containers/0/resources
    - group: apps
      kind: Deployment
      name: argocd-server
      jsonPointers:
        - /spec/template/spec/containers/0/resources
  syncPolicy:
    automated:
      # DO NOT prune — accidentally removing a manifest must not let ArgoCD delete itself.
      prune: false
      # selfHeal disabled so we can hand-patch ArgoCD's own StatefulSet (e.g. raise
      # memory limits) without ArgoCD reverting the change to upstream defaults.
      # Re-enable + move overrides into a kustomization once we have time.
      selfHeal: false
    syncOptions:
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
