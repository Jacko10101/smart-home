apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config
  namespace: home-assistant
data:
  configuration.yaml: |
    # Core Configuration
    default_config:

    # HTTP Settings
    http:
      server_port: 8123

    # Prometheus Integration
    prometheus:
      namespace: homeassistant
      require_auth: true

    # API Settings
    api:

    # Lovelace in YAML mode for GitOps
    lovelace:
      mode: yaml
      resources:
        - url: /hacsfiles/lovelace-mushroom/mushroom.js
          type: module

    # Group Configuration
    group:
      living_room_lights:
        name: Living Room Lights
        entities:
          - light.living_room_left_1
          - light.living_room_left_2
          - light.living_room_middle_1
          - light.living_room_middle_2
          - light.living_room_right_1
          - light.living_room_right_2

    # Include other configurations
    scene: !include scenes.yaml
    automation: !include automations.yaml

  ui-lovelace.yaml: |
    title: Home
    views:
      # ===== HOME TAB =====
      - title: Home
        path: home
        icon: mdi:home
        type: sections
        sections:
          - type: grid
            cards:
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: weather
                    entity: weather.forecast_home
                    show_temperature: true
                    show_conditions: true
                  - type: template
                    icon: "{{ 'mdi:motion-sensor' if is_state('binary_sensor.living_room_presence_occupancy','on') else 'mdi:motion-sensor-off' }}"
                    icon_color: "{{ 'green' if is_state('binary_sensor.living_room_presence_occupancy','on') else 'grey' }}"
                    content: "{{ 'Occupied' if is_state('binary_sensor.living_room_presence_occupancy','on') else 'Empty' }}"
                  - type: template
                    icon: mdi:lightbulb-group
                    content: "{{ states.light | selectattr('state','eq','on') | list | count }} on"
                    tap_action:
                      action: navigate
                      navigation_path: /lovelace/lights

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Quick Actions
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: All Off
                    icon: mdi:power
                    icon_color: red
                    tap_action:
                      action: call-service
                      service: homeassistant.turn_off
                      target:
                        entity_id:
                          - group.living_room_lights
                          - switch.hallway_lamp
                    layout: vertical
                    fill_container: true
                  - type: custom:mushroom-template-card
                    primary: Daylight
                    icon: mdi:white-balance-sunny
                    icon_color: amber
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.daylight
                    layout: vertical
                    fill_container: true
                  - type: custom:mushroom-template-card
                    primary: Relax
                    icon: mdi:sofa
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.evening_relax
                    layout: vertical
                    fill_container: true
                  - type: custom:mushroom-template-card
                    primary: Movie
                    icon: mdi:movie
                    icon_color: deep-purple
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.movie_mode
                    layout: vertical
                    fill_container: true

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Living Room
              - type: custom:mushroom-template-card
                primary: Lights
                secondary: "{{ states.light | selectattr('entity_id','search','living_room') | selectattr('state','eq','on') | list | count }} of 6 on"
                icon: mdi:sofa
                icon_color: "{% if states.light | selectattr('entity_id','search','living_room') | selectattr('state','eq','on') | list | count > 0 %}amber{% else %}disabled{% endif %}"
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/lights
              - type: custom:mushroom-entity-card
                entity: binary_sensor.living_room_presence_occupancy
                name: Presence
                icon: mdi:motion-sensor
              - type: custom:mushroom-entity-card
                entity: sensor.living_room_presence_illumination
                name: Room Light
                icon: mdi:theme-light-dark

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Bedroom
              - type: custom:mushroom-light-card
                entity: light.bedroom_light
                name: Bedroom Light
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Bright
                    icon: mdi:lightbulb-on
                    icon_color: amber
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_bright
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Warm
                    icon: mdi:lightbulb-on-outline
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_warm
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Nightlight
                    icon: mdi:weather-night
                    icon_color: deep-orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_nightlight
                    layout: vertical
              - type: custom:mushroom-template-card
                primary: Sunrise Wake-Up
                secondary: "{{ 'On — weekdays 08:00' if is_state('automation.bedroom_sunrise_wake_up','on') else 'Paused' }}"
                icon: mdi:weather-sunset-up
                icon_color: "{{ 'amber' if is_state('automation.bedroom_sunrise_wake_up','on') else 'grey' }}"
                tap_action:
                  action: call-service
                  service: automation.toggle
                  target:
                    entity_id:
                      - automation.bedroom_sunrise_wake_up
                      - automation.bedroom_wake_up_auto_off

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Utility Room
              - type: custom:mushroom-light-card
                entity: light.utility_light
                name: Utility Light
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Bright
                    icon: mdi:lightbulb-on
                    icon_color: amber
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.utility_bright
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Warm
                    icon: mdi:lightbulb-on-outline
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.utility_warm
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: 'Off'
                    icon: mdi:lightbulb-off
                    icon_color: grey
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.utility_off
                    layout: vertical

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Auto Lighting
              - type: custom:mushroom-template-card
                primary: Presence Lighting
                secondary: "{{ 'Active' if is_state('automation.lr_lights_on_when_someone_enters_a_dim_room','on') else 'Paused' }}"
                icon: mdi:lightbulb-auto
                icon_color: "{{ 'green' if is_state('automation.lr_lights_on_when_someone_enters_a_dim_room','on') else 'grey' }}"
                tap_action:
                  action: call-service
                  service: automation.toggle
                  target:
                    entity_id:
                      - automation.lr_lights_on_when_someone_enters_a_dim_room
                      - automation.lr_lights_off_when_room_empty

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Switches
              - type: custom:mushroom-entity-card
                entity: switch.hallway_lamp
                name: Hallway Lamp
                icon: mdi:lamp
                icon_color: amber
                tap_action:
                  action: toggle

      # ===== LIGHTS TAB =====
      - title: Lights
        path: lights
        icon: mdi:lightbulb-group
        type: sections
        sections:
          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Scenes
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Daylight
                    icon: mdi:white-balance-sunny
                    icon_color: amber
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.daylight
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Gaming
                    icon: mdi:controller
                    icon_color: blue
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.gaming_mode
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Movie
                    icon: mdi:movie
                    icon_color: deep-purple
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.movie_mode
                    layout: vertical
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Relax
                    icon: mdi:sofa
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.evening_relax
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Reading
                    icon: mdi:book-open-variant
                    icon_color: lime
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.night_reading
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Party
                    icon: mdi:party-popper
                    icon_color: pink
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.party_mode
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Cavs
                    icon: mdi:basketball
                    icon_color: deep-purple
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.cavs_game
                    layout: vertical
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Golden Hour
                    icon: mdi:weather-sunset
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.golden_hour
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Candlelight
                    icon: mdi:candle
                    icon_color: amber
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.candlelight
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Focus
                    icon: mdi:white-balance-iridescent
                    icon_color: light-blue
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.focus
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Tranquil
                    icon: mdi:waves
                    icon_color: teal
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.tranquil
                    layout: vertical

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Living Room Lights
              - type: custom:mushroom-light-card
                entity: light.living_room_left_1
                name: Left 1
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: custom:mushroom-light-card
                entity: light.living_room_left_2
                name: Left 2
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: custom:mushroom-light-card
                entity: light.living_room_middle_1
                name: Middle 1
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: custom:mushroom-light-card
                entity: light.living_room_middle_2
                name: Middle 2
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: custom:mushroom-light-card
                entity: light.living_room_right_1
                name: Right 1
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: custom:mushroom-light-card
                entity: light.living_room_right_2
                name: Right 2
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Bedroom
              - type: custom:mushroom-light-card
                entity: light.bedroom_light
                name: Bedroom Light
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Bright
                    icon: mdi:lightbulb-on
                    icon_color: amber
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_bright
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Warm
                    icon: mdi:lightbulb-on-outline
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_warm
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Nightlight
                    icon: mdi:weather-night
                    icon_color: deep-orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_nightlight
                    layout: vertical
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Calm
                    icon: mdi:weather-night-partly-cloudy
                    icon_color: blue
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_calm
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Sunset
                    icon: mdi:weather-sunset
                    icon_color: pink
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_sunset
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Cycle
                    icon: mdi:looks
                    icon_color: purple
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_colour_cycle
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: 'Off'
                    icon: mdi:lightbulb-off
                    icon_color: grey
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.bedroom_off
                    layout: vertical

          - type: grid
            cards:
              - type: custom:mushroom-title-card
                title: Utility Room
              - type: custom:mushroom-light-card
                entity: light.utility_light
                name: Utility Light
                use_light_color: true
                show_brightness_control: true
                show_color_control: true
                collapsible_controls: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-template-card
                    primary: Bright
                    icon: mdi:lightbulb-on
                    icon_color: amber
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.utility_bright
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: Warm
                    icon: mdi:lightbulb-on-outline
                    icon_color: orange
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.utility_warm
                    layout: vertical
                  - type: custom:mushroom-template-card
                    primary: 'Off'
                    icon: mdi:lightbulb-off
                    icon_color: grey
                    tap_action:
                      action: call-service
                      service: scene.turn_on
                      data:
                        entity_id: scene.utility_off
                    layout: vertical

  scenes.yaml: |
    - name: "Wake Up"
      entities:
        group.living_room_lights:
          state: 'on'
          brightness: 1
          rgb_color: [255, 130, 40]
          transition: 1200
        switch.hallway_lamp:
          state: 'on'

    - name: "Daylight"
      entities:
        group.living_room_lights:
          state: 'on'
          brightness: 255
          rgb_color: [255, 250, 244]
          transition: 5

    - name: "Golden Hour"
      entities:
        light.living_room_left_1:
          state: 'on'
          brightness: 200
          rgb_color: [255, 110, 20]
        light.living_room_left_2:
          state: 'on'
          brightness: 200
          rgb_color: [255, 110, 20]
        light.living_room_middle_1:
          state: 'on'
          brightness: 175
          rgb_color: [255, 160, 55]
        light.living_room_middle_2:
          state: 'on'
          brightness: 175
          rgb_color: [255, 160, 55]
        light.living_room_right_1:
          state: 'on'
          brightness: 200
          rgb_color: [255, 85, 15]
        light.living_room_right_2:
          state: 'on'
          brightness: 200
          rgb_color: [255, 85, 15]

    - name: "Evening Relax"
      entities:
        group.living_room_lights:
          state: 'on'
          brightness: 128
          rgb_color: [255, 140, 50]
          transition: 5
        switch.hallway_lamp:
          state: 'on'

    - name: "Candlelight"
      entities:
        group.living_room_lights:
          state: 'on'
          brightness: 42
          rgb_color: [255, 110, 30]
          transition: 3
        switch.hallway_lamp:
          state: 'off'

    - name: "Night Reading"
      entities:
        light.living_room_middle_1:
          state: 'on'
          brightness: 160
          rgb_color: [255, 185, 110]
        light.living_room_middle_2:
          state: 'on'
          brightness: 160
          rgb_color: [255, 185, 110]
        light.living_room_left_1:
          state: 'on'
          brightness: 50
          rgb_color: [255, 150, 70]
        light.living_room_left_2:
          state: 'on'
          brightness: 50
          rgb_color: [255, 150, 70]
        light.living_room_right_1:
          state: 'on'
          brightness: 50
          rgb_color: [255, 150, 70]
        light.living_room_right_2:
          state: 'on'
          brightness: 50
          rgb_color: [255, 150, 70]

    - name: "Focus"
      entities:
        group.living_room_lights:
          state: 'on'
          brightness: 255
          rgb_color: [225, 238, 255]
          transition: 2

    - name: "Tranquil"
      entities:
        light.living_room_left_1:
          state: 'on'
          brightness: 120
          rgb_color: [0, 140, 170]
        light.living_room_left_2:
          state: 'on'
          brightness: 120
          rgb_color: [0, 140, 170]
        light.living_room_middle_1:
          state: 'on'
          brightness: 120
          rgb_color: [20, 70, 160]
        light.living_room_middle_2:
          state: 'on'
          brightness: 120
          rgb_color: [20, 70, 160]
        light.living_room_right_1:
          state: 'on'
          brightness: 120
          rgb_color: [0, 160, 150]
        light.living_room_right_2:
          state: 'on'
          brightness: 120
          rgb_color: [0, 160, 150]

    - name: "Gaming Mode"
      entities:
        light.living_room_left_1:
          state: 'on'
          brightness: 200
          rgb_color: [0, 0, 255]
        light.living_room_left_2:
          state: 'on'
          brightness: 200
          rgb_color: [0, 0, 255]
        light.living_room_right_1:
          state: 'on'
          brightness: 200
          rgb_color: [255, 0, 0]
        light.living_room_right_2:
          state: 'on'
          brightness: 200
          rgb_color: [255, 0, 0]
        light.living_room_middle_1:
          state: 'on'
          brightness: 50
          rgb_color: [148, 0, 211]
        light.living_room_middle_2:
          state: 'on'
          brightness: 50
          rgb_color: [148, 0, 211]

    - name: "Movie Mode"
      entities:
        light.living_room_left_1:
          state: 'on'
          brightness: 30
          rgb_color: [255, 69, 0]
        light.living_room_left_2:
          state: 'on'
          brightness: 30
          rgb_color: [255, 69, 0]
        light.living_room_right_1:
          state: 'on'
          brightness: 30
          rgb_color: [255, 69, 0]
        light.living_room_right_2:
          state: 'on'
          brightness: 30
          rgb_color: [255, 69, 0]
        light.living_room_middle_1:
          state: 'off'
        light.living_room_middle_2:
          state: 'off'
        switch.hallway_lamp:
          state: 'off'

    - name: "Party Mode"
      entities:
        light.living_room_left_1:
          state: 'on'
          brightness: 255
          rgb_color: [255, 0, 0]
        light.living_room_left_2:
          state: 'on'
          brightness: 255
          rgb_color: [0, 255, 0]
        light.living_room_middle_1:
          state: 'on'
          brightness: 255
          rgb_color: [0, 0, 255]
        light.living_room_middle_2:
          state: 'on'
          brightness: 255
          rgb_color: [255, 255, 0]
        light.living_room_right_1:
          state: 'on'
          brightness: 255
          rgb_color: [255, 0, 255]
        light.living_room_right_2:
          state: 'on'
          brightness: 255
          rgb_color: [0, 255, 255]

    - name: "Cavs Game"
      entities:
        light.living_room_left_1:
          state: 'on'
          brightness: 255
          rgb_color: [134, 0, 56]
        light.living_room_left_2:
          state: 'on'
          brightness: 255
          rgb_color: [134, 0, 56]
        light.living_room_middle_1:
          state: 'on'
          brightness: 255
          rgb_color: [253, 187, 48]
        light.living_room_middle_2:
          state: 'on'
          brightness: 255
          rgb_color: [253, 187, 48]
        light.living_room_right_1:
          state: 'on'
          brightness: 255
          rgb_color: [134, 0, 56]
        light.living_room_right_2:
          state: 'on'
          brightness: 255
          rgb_color: [134, 0, 56]
        switch.hallway_lamp:
          state: 'off'

    - name: "Goodnight"
      entities:
        group.living_room_lights:
          state: 'off'
        switch.hallway_lamp:
          state: 'off'

    # ===== Bedroom (light.bedroom_light) — RGB only; bulb rejects color_temp via z2m.
    # Static scenes only (no moving/animated effects); each one visually distinct. =====
    - name: "Bedroom Bright"            # clean full white — getting dressed / cleaning
      entities:
        light.bedroom_light:
          state: 'on'
          brightness: 254
          rgb_color: [255, 244, 234]
          transition: 1

    - name: "Bedroom Warm"             # cosy low amber — evening wind-down
      entities:
        light.bedroom_light:
          state: 'on'
          brightness: 120
          rgb_color: [255, 145, 55]
          transition: 3

    - name: "Bedroom Nightlight"       # very dim deep amber — middle of the night
      entities:
        light.bedroom_light:
          state: 'on'
          brightness: 4
          rgb_color: [255, 75, 15]
          transition: 3

    - name: "Bedroom Calm"             # soft blue — distinct, relaxing
      entities:
        light.bedroom_light:
          state: 'on'
          brightness: 90
          rgb_color: [40, 120, 215]
          transition: 3

    - name: "Bedroom Sunset"           # static warm coral/pink — distinct, no animation
      entities:
        light.bedroom_light:
          state: 'on'
          brightness: 150
          rgb_color: [255, 95, 80]
          transition: 3

    - name: "Bedroom Colour Cycle"     # animated — slowly loops through the colour wheel
      entities:
        light.bedroom_light:
          state: 'on'
          brightness: 200
          effect: colorloop

    - name: "Bedroom Off"
      entities:
        light.bedroom_light:
          state: 'off'
          transition: 3

    # ===== Utility room (light.utility_light) — transit room by the front door =====
    - name: "Utility Bright"
      entities:
        light.utility_light:
          state: 'on'
          brightness: 254
          rgb_color: [255, 245, 235]
          transition: 1

    - name: "Utility Warm"
      entities:
        light.utility_light:
          state: 'on'
          brightness: 120
          rgb_color: [255, 160, 85]
          transition: 2

    - name: "Utility Off"
      entities:
        light.utility_light:
          state: 'off'
          transition: 2

  automations.yaml: |
    - alias: "Workday Wake Up"
      trigger:
        platform: time
        at: "07:45:00"
      condition:
        - condition: time
          weekday:
            - mon
            - tue
            - wed
            - thu
            - fri
      action:
        - service: scene.turn_on
          target:
            entity_id: scene.wake_up
        - delay: "00:20:00"
        - service: scene.turn_on
          target:
            entity_id: scene.daylight

    - alias: "Evening Wind Down"
      trigger:
        platform: sun
        event: sunset
        offset: "+00:30:00"
      action:
        - service: scene.turn_on
          target:
            entity_id: scene.evening_relax

    # ===== Living Room presence-lighting POC (mmWave-driven) =====
    # Uses living_room_presence (SNZB-06P) only — the PIR is dead and mmWave
    # holds presence while still, so no lights-off-on-a-still-person.
    - alias: "LR: Lights on when someone enters a dim room"
      id: lr_presence_lights_on
      trigger:
        - platform: state
          entity_id: binary_sensor.living_room_presence_occupancy
          to: "on"
      condition:
        # gate on darkness via the sun, NOT the 06P illumination: that sensor lags
        # and reads 'bright' for a beat after the lights switch off (it's affected by
        # the very lights this rule controls), which caused missed turn-ons.
        - condition: state
          entity_id: sun.sun
          state: "below_horizon"
        # ...and only if the lights are off, so we never override a chosen scene
        - condition: state
          entity_id: group.living_room_lights
          state: "off"
      action:
        - service: light.turn_on
          target:
            entity_id: group.living_room_lights
          data:
            brightness: 115            # ~45% — soft, not bright
            rgb_color: [255, 160, 85]  # warm white — bulbs reject color_temp via z2m
            transition: 2
      mode: single

    - alias: "LR: Lights off when room empty"
      id: lr_presence_lights_off
      trigger:
        - platform: state
          entity_id: binary_sensor.living_room_presence_occupancy
          to: "off"
          for: "00:03:00"
      # No TV-power guard: this plug's metering is unreliable, and mmWave already
      # holds presence for anyone watching (even dead still), so empty == empty.
      action:
        - service: light.turn_off
          target:
            entity_id: group.living_room_lights
          data:
            transition: 3
      mode: single

    # ===== Bedroom sunrise wake-up (no presence sensor — pure time/weekday) =====
    # Jack starts work ~08:30 UK most weekdays. Ramp 0 -> full warm over 25 min so
    # it's fully up by ~08:25. Starting from off, z2m fades brightness up.
    - alias: "Bedroom Sunrise Wake Up"
      id: bedroom_sunrise_wake_up
      trigger:
        - platform: time
          at: "08:00:00"
      condition:
        - condition: time
          weekday:
            - mon
            - tue
            - wed
            - thu
            - fri
      action:
        - service: light.turn_on
          target:
            entity_id: light.bedroom_light
          data:
            brightness: 254
            rgb_color: [255, 180, 120]   # warm sunrise glow — bulb rejects color_temp
            transition: 1500             # 25-min ramp, full by ~08:25
      mode: single

    # Safety: don't leave the bedroom light burning all day after Jack leaves.
    - alias: "Bedroom Wake Up Auto Off"
      id: bedroom_wake_up_auto_off
      trigger:
        - platform: time
          at: "09:15:00"
      condition:
        - condition: time
          weekday:
            - mon
            - tue
            - wed
            - thu
            - fri
      action:
        - service: light.turn_off
          target:
            entity_id: light.bedroom_light
          data:
            transition: 5
      mode: single
