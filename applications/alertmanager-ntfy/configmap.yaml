apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-ntfy-config
  namespace: monitoring
data:
  config.yml: |
    http:
      addr: :8000
    log:
      level: info
      format: json
    ntfy:
      baseurl: https://ntfy.sh
      notification:
        topic: jack-smarthome-050101
        # Priority mapping is deliberately tiered for sleep:
        #   - critical firing: urgent (ntfy 5)  -> wakes the phone, bypasses ring-silence
        #   - warning firing:  low    (ntfy 2)  -> silent notification, no sound/vibe
        #   - any resolved:    low    (ntfy 2)  -> silent
        # Warnings show up in the notification tray for morning review but
        # don't ring at 3am. Only criticals are sleep-disrupting.
        priority: |
          status == "firing" ? (labels.severity == "critical" ? "urgent" : "low") : "low"
        tags:
          - tag: rotating_light
            condition: status == "firing"
          - tag: white_check_mark
            condition: status == "resolved"
        templates:
          title: |
            {{ if eq .Status "resolved" }}Resolved: {{ end }}{{ .Labels.alertname }}{{ if .Labels.namespace }} ({{ .Labels.namespace }}){{ end }}
          description: |
            {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ end }}
            {{ if .Annotations.description }}
            {{ .Annotations.description }}{{ end }}
