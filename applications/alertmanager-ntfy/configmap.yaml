apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-ntfy-config
  namespace: monitoring
data:
  config.yml: |
    http:
      addr: :8000
    log:
      level: info
      format: json
    ntfy:
      baseurl: https://ntfy.sh
      notification:
        topic: jack-smarthome-050101
        priority: |
          {{- if eq .Status "firing" -}}
            {{- if eq .Labels.severity "critical" -}}urgent
            {{- else if eq .Labels.severity "warning" -}}high
            {{- else -}}default
            {{- end -}}
          {{- else -}}low
          {{- end -}}
        title: |
          {{- if eq .Status "firing" -}}🔥 {{ end -}}
          {{- if eq .Status "resolved" -}}✅ {{ end -}}
          {{ .Labels.alertname }}{{- if .Labels.namespace }} ({{ .Labels.namespace }}){{- end -}}
        description: |
          {{ .Annotations.summary }}
          {{- if .Annotations.description }}

          {{ .Annotations.description }}
          {{- end }}
