apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smart-home-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: smart-home-services
      rules:
        # Home Assistant down
        - alert: HomeAssistantDown
          expr: up{job="home-assistant"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Home Assistant is down"
            description: "Home Assistant has been unreachable for more than 2 minutes."

        # Zigbee2MQTT down (check via service endpoint)
        - alert: Zigbee2MQTTDown
          expr: kube_deployment_status_replicas_available{deployment="zigbee2mqtt", namespace="zigbee"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Zigbee2MQTT is down"
            description: "Zigbee2MQTT has no available replicas for more than 2 minutes."

        # Mosquitto MQTT down
        - alert: MosquittoDown
          expr: kube_deployment_status_replicas_available{deployment="mosquitto", namespace="mosquitto"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Mosquitto MQTT broker is down"
            description: "Mosquitto has no available replicas for more than 2 minutes."

    - name: smart-home-resources
      rules:
        # High CPU usage on node
        - alert: HighNodeCPU
          expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on {{ $labels.instance }}"
            description: "CPU usage is above 80% for more than 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

        # High memory usage on node
        - alert: HighNodeMemory
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ $labels.instance }}"
            description: "Memory usage is above 85% for more than 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

        # Disk space low
        - alert: LowDiskSpace
          expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low disk space on {{ $labels.instance }}"
            description: "Disk usage on {{ $labels.mountpoint }} is above 80% (current: {{ $value | printf \"%.1f\" }}%)."

        # Disk space critical
        - alert: CriticalDiskSpace
          expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 90
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Critical disk space on {{ $labels.instance }}"
            description: "Disk usage on {{ $labels.mountpoint }} is above 90% (current: {{ $value | printf \"%.1f\" }}%)."

    - name: smart-home-pods
      rules:
        # Pod restart loop
        - alert: PodRestartLoop
          expr: increase(kube_pod_container_status_restarts_total[1h]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is restarting frequently"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value | printf \"%.0f\" }} times in the last hour."

        # Pod not ready
        - alert: PodNotReady
          expr: kube_pod_status_ready{condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 5 minutes."

    - name: backup-alerts
      rules:
        # Backup job failed
        - alert: BackupJobFailed
          expr: kube_job_status_failed{namespace="backup"} > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Backup job failed"
            description: "The smart-home backup job has failed. Check the job logs for details."

        # No successful backup in 36 hours — catches silent backup failure
        # (e.g. Mar 12 → May 15 2026: pi was down, backups silently didn't run)
        - alert: BackupHasntRunRecently
          expr: time() - max(kube_cronjob_status_last_successful_time{cronjob="smart-home-backup"}) > 60*60*36
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "No successful backup in over 36 hours"
            description: "Last successful backup was more than 36h ago. Daily backup CronJob may be failing silently."

    - name: smart-home-silent-failures
      rules:
        # Pi rebooted (or watchdog fired) — would have caught the March 12 → May 15 outage IF an alert was wired up
        - alert: PiRebooted
          expr: time() - node_boot_time_seconds < 600
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pi rebooted within the last 10 minutes"
            description: "Pi boot time was less than 10 minutes ago. If unplanned, investigate via `journalctl -b -1`."
        # Z2M MQTT bridge reports offline. Catches the case where the z2m process is alive
        # (pod-up alerts wouldn't fire) but its MQTT client has disconnected — z2m publishes
        # its bridge state via LWT, HA mirrors it as this binary_sensor.
        - alert: Zigbee2MQTTBridgeOffline
          expr: homeassistant_binary_sensor_state{entity="binary_sensor.zigbee2mqtt_bridge_connection_state"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Zigbee2MQTT bridge reports offline to MQTT"
            description: "Z2M bridge_connection_state has been 0 for 5m — z2m is up but not talking to mosquitto. Check z2m logs and mosquitto."

        # Z2M is up and MQTT-connected but no zigbee messages are flowing — catches the
        # "USB serial silently stuck" failure mode. Threshold 1h: SONOFF SNZB-02D temp
        # sensors heartbeat at least every ~34min, so all of them stale > 1h means the
        # whole zigbee mesh has gone quiet from HA's perspective. Uses min() so a single
        # battery-dead sensor doesn't trigger the alert.
        - alert: Zigbee2MQTTNoUpdates
          expr: min(time() - homeassistant_last_updated_time_seconds{entity=~"sensor\\.(living_room|hallway)_sensor_temperature"}) > 3600
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "No zigbee sensor updates for over 1 hour"
            description: "Every z2m heartbeat sensor is stale > 1h. Likely USB serial hung or zigbee radio stuck. Try `kubectl rollout restart deployment/zigbee2mqtt -n zigbee`."
